# 🚀 Render Blueprint for Focus Flow
# Deployment with Docker for maximum compatibility (OpenCV/Mediapipe dependencies pre-installed)

services:
  - type: web
    name: focus-flow-app
    runtime: docker
    env: docker
    plan: free # Can be upgraded if needed
    
    # Environment variables
    envVars:
      - key: STREAMLIT_SERVER_PORT
        value: 10000
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: DATABASE_URL
        value: sqlite:///focus_flow.db # Default to local SQLite for simplicity
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
    
    healthCheckPath: /_stcore/health
    
    # Optional: Connect a real database (Postgres) by setting DATABASE_URL in Render Dashboard
