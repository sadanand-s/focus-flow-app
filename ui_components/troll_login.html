<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', 'Inter', sans-serif;
    }

    #troll-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0F1117;
      z-index: 9999;
      overflow: hidden;
    }

    #hint-text {
      position: fixed;
      top: 30px;
      width: 100%;
      text-align: center;
      color: #9E9E9E;
      font-size: 0.9rem;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10000;
    }

    #bouncy-btn {
      position: absolute;
      padding: 16px 36px;
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #00D2FF);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.6);
      transition: transform 0.1s;
      user-select: none;
      z-index: 10;
      left: 50%;
      top: 50%;
    }

    #bouncy-btn:hover {
      transform: scale(1.08);
    }

    #troll-overlay.hiding {
      animation: overlayFade 0.6s ease forwards;
    }

    @keyframes overlayFade {
      to {
        opacity: 0;
        pointer-events: none;
      }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="troll-overlay">
    <div id="hint-text">&#127919; Catch the button to login!</div>
    <button id="bouncy-btn" onclick="trollClicked()">&#127919; CLICK ME</button>
  </div>

  <script>
    // Check if already caught this session
    if (sessionStorage.getItem('troll_done') === 'true') {
      document.getElementById('troll-overlay').remove();
      // Signal parent to show login
      window.parent.postMessage({ type: 'troll_caught' }, '*');
    }

    var x = window.innerWidth / 2;
    var y = window.innerHeight / 2;
    var vx = 3.2, vy = 2.6;
    var btn = document.getElementById('bouncy-btn');
    var animating = true;
    var x = window.innerWidth / 2;
    var y = window.innerHeight / 2;
    var vx = 3.2, vy = 2.6;

    // Constrain motion to keep button visible in the iframe
    function bounce() {
      if (!animating || !btn) return;
      var W = window.innerWidth;
      var H = window.innerHeight;
      var bw = btn.offsetWidth || 160;
      var bh = btn.offsetHeight || 56;

      x += vx;
      y += vy;

      // Safe bounds (5px padding)
      if (x <= 5) { x = 5; vx = Math.abs(vx); }
      if (x >= W - bw - 5) { x = W - bw - 5; vx = -Math.abs(vx); }
      if (y <= 5) { y = 5; vy = Math.abs(vy); }
      if (y >= H - bh - 5) { y = H - bh - 5; vy = -Math.abs(vy); }

      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      requestAnimationFrame(bounce);
    }

    setTimeout(function () {
      if (!btn) return;
      var bw = btn.offsetWidth || 160;
      var bh = btn.offsetHeight || 56;
      x = Math.max(10, (window.innerWidth - bw) / 2);
      y = Math.max(10, (window.innerHeight - bh) / 2);
      bounce();
    }, 150);

    function explodeParticles(cx, cy) {
      var colors = ['#6C63FF', '#00D2FF', '#00E676', '#FFD600', '#FF5252'];
      for (var i = 0; i < 20; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        var size = 5 + Math.random() * 12;
        var angle = (Math.PI * 2 * i) / 20;
        var dist = 40 + Math.random() * 80;
        var tx = cx + Math.cos(angle) * dist;
        var ty = cy + Math.sin(angle) * dist;
        p.style.cssText = 'position:absolute;left:' + cx + 'px;top:' + cy + 'px;width:' + size + 'px;height:' + size + 'px;background:' + colors[i % colors.length] + ';border-radius:50%;transition:left 0.6s ease-out,top 0.6s ease-out,opacity 0.6s;';
        document.body.appendChild(p);
        requestAnimationFrame(function (el, etx, ety) {
          return function () {
            el.style.left = etx + 'px';
            el.style.top = ety + 'px';
            el.style.opacity = '0';
          };
        }(p, tx, ty));
        setTimeout(function (el) { return function () { if (el.parentNode) el.remove(); }; }(p), 800);
      }
    }

    function trollClicked() {
      animating = false;
      var bx = x + (btn.offsetWidth || 160) / 2;
      var by = y + (btn.offsetHeight || 56) / 2;
      explodeParticles(bx, by);

      btn.textContent = '✅ Nice catch!';
      btn.style.transform = 'scale(1.3)';
      btn.style.background = 'linear-gradient(135deg, #00E676, #00D2FF)';

      setTimeout(function () {
        var overlay = document.getElementById('troll-overlay');
        if (overlay) overlay.classList.add('hiding');
        setTimeout(function () {
          var overlay2 = document.getElementById('troll-overlay');
          if (overlay2) overlay2.remove();
          // Save to sessionStorage so it never shows again this session
          sessionStorage.setItem('troll_done', 'true');
          // Notify parent Streamlit frame
          window.parent.postMessage({ type: 'troll_caught' }, '*');
        }, 600);
      }, 500);
    }
  </script>
</body>

</html>
