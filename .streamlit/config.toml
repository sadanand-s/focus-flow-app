[theme]
primaryColor = "#6C63FF"
backgroundColor = "#0F1117"
secondaryBackgroundColor = "#1A1D27"
textColor = "#FFFFFF"
font = "sans serif"

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 50
# HTTPS support — required for camera/mic access (EAR & Gaze tracking)
# sslCertFile = ".streamlit/ssl/cert.pem"
# sslKeyFile  = ".streamlit/ssl/key.pem"
port = 8501

[browser]
gatherUsageStats = false

[runner]
# Allows the webrtc fragment to auto-refresh properly
fastReruns = true
